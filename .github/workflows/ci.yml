name: doasudo CI

on:
  push:
  pull_request:

jobs:
  native-check:
    name: Native ${{ matrix.make }}${{ matrix.edit_mode == 0 && ', no edit mode' || '' }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        edit_mode: [0, 1]
        include:
          - os: ubuntu-latest
            make: make
          - os: macos-latest
            make: gmake

    steps:
      - uses: actions/checkout@064fe7f3312418007dea2b49a19844a9ee378f49

      # Pinned copy of https://github.com/GiovanniBussi/macports-ci
      - name: Checkout macports-ci (pinned)
        if: runner.os == 'macOS'
        uses: actions/checkout@064fe7f3312418007dea2b49a19844a9ee378f49
        with:
          repository: GiovanniBussi/macports-ci
          ref: 7e72ecdc52a15803c199ec11667b7a9e21695f7b
          path: vendor/macports-ci

      # macOS only: run macports-ci install (binary pkg + selfupdate). Adds /opt/local/bin to GITHUB_PATH.
      - name: Bootstrap MacPorts (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          chmod +x vendor/macports-ci/macports-ci
          source ./vendor/macports-ci/macports-ci install
          echo "/opt/local/bin" >> "$GITHUB_PATH"
          echo "/opt/local/sbin" >> "$GITHUB_PATH"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y doas shellcheck socat
          printf '%s\n' 'permit nopass runner' | sudo tee /etc/doas.conf >/dev/null
          sudo chmod 600 /etc/doas.conf

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eu
          sudo port -N install doas gmake shellcheck socat
          sudo chmod 4755 /opt/local/bin/doas 2>/dev/null || true
          if [ -r /etc/pam.d/sudo ] && [ ! -e /etc/pam.d/doas ]; then
            sudo cp /etc/pam.d/sudo /etc/pam.d/doas
          fi
          printf '%s\n' 'permit nopass runner' | sudo tee /opt/local/etc/doas.conf >/dev/null
          sudo chmod 600 /opt/local/etc/doas.conf
          sudo ln -sf /bin/dash /var/select/sh

      - name: Run tests (${{ matrix.make }} EDIT_MODE=${{ matrix.edit_mode }})
        run: ${{ matrix.make }} EDIT_MODE=${{ matrix.edit_mode }} check-all

  docker-test:
    name: Docker ${{ matrix.name }} (user check + doas install in image)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Alpine
            tag: doasudo-alpine
            make: make
          - name: Chimera
            tag: doasudo-chimera
            make: gmake

    steps:
      - uses: actions/checkout@064fe7f3312418007dea2b49a19844a9ee378f49

      - name: Build image (Makefile's check target run at image build time)
        run: docker build -f "tests/docker/${{ matrix.name }}.Dockerfile" -t ${{ matrix.tag }} .

      - name: Show installed shim version
        run: docker run --rm ${{ matrix.tag }} sh -c 'PATH=/usr/local/bin:/usr/bin:/bin exec sudo -V'

      - name: Smoke broker doas rule (editbroker hop)
        run: |
          scr="set -eu;"
          scr="$scr PATH=/usr/local/bin:/usr/bin:/bin;"
          scr="$scr BROKER=/usr/local/libexec/doasudo/edit-broker;"
          scr="$scr resp=\$(printf 'MAGIC=WRONG\n' | doas -n -u editbroker -- \$BROKER 2>/dev/null | head -n 1) || true;"
          scr="$scr test \$resp = 'RESP_CODE=1' && echo 'PASS: doas -u editbroker'"

          docker run --rm ${{ matrix.tag }} sh -c "$scr"

      - name: Broker E2E (broker-e2e_test.sh)
        run: |
          scr="set -eu;"
          scr="$scr PATH=/usr/local/bin:/usr/bin:/bin;"
          scr="$scr OVERWRITE_SYMLINKS=1 BROKER_E2E_SKIP_BUILD=1 BROKER_E2E_APPEND_DOAS_CONF=1"
          scr="$scr ${{ matrix.make }} broker-e2e-setup"
          scr="$scr && su -s /bin/sh user -c 'cd /src && exec ${{ matrix.make }} check-broker-e2e'"

          docker run --rm -u 0 -w /src ${{ matrix.tag }} sh -c "$scr"

      - name: ${{ matrix.make }} uninstall as root
        run: |
          docker run --rm -u 0 -w /src ${{ matrix.tag }} sh -c '
            set -e
            ${{ matrix.make }} uninstall &&
            test ! -e /usr/local/bin/sudo &&
            test ! -d /usr/local/libexec/doasudo
          '
